# =============================================================================
# Dependabot configuration
# Keeps dependencies, container images, and GitHub Actions up to date.
#
# Dependabot SECURITY updates (separate from version updates) must also be
# enabled at the repo level:
#   Settings → Code security and analysis → Dependabot security updates → ON
# When enabled, GitHub auto-opens PRs for any published security advisory
# affecting this repo's dependency graph. The labels below (security,
# automated) ensure those PRs show up in the same view as version updates.
# =============================================================================
# Label correlation with .github/labeler.yml:
#   - "dependencies"   → every Dependabot PR
#   - "automated"      → bot-generated
#   - "security"       → security-related (applied to vuln-fix PRs and to
#                        the Critical CVE issues opened by
#                        .github/workflows/security-issue.yml)
#   - "<area>"         → scope label (e.g. backend, frontend, ci, docker)
# =============================================================================

version: 2

updates:
  # ---------------------------------------------------------------------------
  # npm workspaces (frontend, backend services, shared, agents)
  # ---------------------------------------------------------------------------
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "automated"
      - "security"
      - "npm"
    groups:
      production:
        dependency-type: "production"
      development:
        dependency-type: "development"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
        # Major bumps are reviewed manually

  # ---------------------------------------------------------------------------
  # Frontend
  # ---------------------------------------------------------------------------
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "automated"
      - "security"
      - "frontend"
    rebase-strategy: "auto"

  # ---------------------------------------------------------------------------
  # Backend services
  # ---------------------------------------------------------------------------
  - package-ecosystem: "npm"
    directory: "/backend/services/auth"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    labels: ["dependencies", "automated", "security", "backend", "auth"]
  - package-ecosystem: "npm"
    directory: "/backend/services/agent"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    labels: ["dependencies", "automated", "security", "backend", "agents"]
  - package-ecosystem: "npm"
    directory: "/backend/services/security"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    labels: ["dependencies", "automated", "security", "backend", "security"]
  - package-ecosystem: "npm"
    directory: "/backend/services/incident"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    labels: ["dependencies", "automated", "security", "backend", "incidents"]
  - package-ecosystem: "npm"
    directory: "/backend/services/compliance"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    labels: ["dependencies", "automated", "security", "backend", "compliance"]
  - package-ecosystem: "npm"
    directory: "/backend/services/integration"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    labels: ["dependencies", "automated", "security", "backend", "integrations"]

  # ---------------------------------------------------------------------------
  # GitHub Actions
  # ---------------------------------------------------------------------------
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "10:00"
      timezone: "Etc/UTC"
    labels:
      - "dependencies"
      - "automated"
      - "security"
      - "ci"
    open-pull-requests-limit: 5

  # ---------------------------------------------------------------------------
  # Docker (base images in compose)
  # ---------------------------------------------------------------------------
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "09:00"
      timezone: "Etc/UTC"
    labels:
      - "dependencies"
      - "automated"
      - "security"
      - "docker"
    open-pull-requests-limit: 5

# =============================================================================
# SBOM Generator Service — Kubernetes Deployment
# =============================================================================
# S2.8 hardening hotfix (T-07, SecurityArchitect):
#   - cosign-verify initContainer: verifies the Syft binary inside the
#     running image against Anchore's keyless OIDC identity. This is a
#     runtime defense-in-depth check; the Dockerfile already pins the
#     Syft digest.
#   - AppArmor profile ``runtime/sbom-scanner``: restricts file/network
#     operations to the Syft runtime needs. Profile must be loaded into
#     the node by the cluster operator (see README in deploy/appArmor/).
#   - Non-root UID 10000 (matches Dockerfile).
#   - Read-only root filesystem, drop-all capabilities, RuntimeDefault
#     seccomp profile, no privilege escalation.
#   - Resource requests/limits with burst headroom.
#   - Volume mounts: /workspace (input), /var/lib/syft (RW cache),
#     /work (RO inputs), /tmp (RW tmpfs).
#   - NetworkPolicy: default-deny ingress; egress limited to DNS and
#     the egress proxy.
#   - ServiceAccount with cosign verification identity annotation.
# =============================================================================

apiVersion: v1
kind: Namespace
metadata:
  name: sbom-generator
  labels:
    app.kubernetes.io/name: sbom-generator
    app.kubernetes.io/part-of: ai-devsecops-command-center
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sbom-generator
  namespace: sbom-generator
  annotations:
    # The cosign-verify initContainer authenticates this identity against
    # the OIDC issuer. If you change the ServiceAccount name, update the
    # initContainer's --certificate-identity accordingly.
    cosign.sigstore.dev/identity: "https://github.com/anchore/syft/.github/workflows/release.yml@refs/tags/v1.6.0"
    cosign.sigstore.dev/issuer: "https://token.actions.githubusercontent.com"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sbom-generator
  namespace: sbom-generator
  labels:
    app.kubernetes.io/name: sbom-generator
    app.kubernetes.io/component: sbom-pipeline
    app.kubernetes.io/version: "1.6.0"
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: sbom-generator
  template:
    metadata:
      annotations:
        # Trigger redeploy on ConfigMap or Secret changes.
        config.checksum: "REPLACE_AT_DEPLOY"
      labels:
        app.kubernetes.io/name: sbom-generator
        app.kubernetes.io/component: sbom-pipeline
    spec:
      serviceAccountName: sbom-generator
      automountServiceAccountToken: false
      # Spread pods across nodes and zones for resilience.
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: sbom-generator
      securityContext:
        runAsNonRoot: true
        runAsUser: 10000
        runAsGroup: 10000
        fsGroup: 10000
        seccompProfile:
          type: RuntimeDefault
      # Init containers run before the main container starts. The
      # cosign-verify initContainer validates the Syft binary that
      # was COPY'd in at build time against the OIDC-signed attestation.
      initContainers:
        - name: cosign-verify
          image: ghcr.io/sigstore/cosign:v2.2.4
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -ec
            - |
              # The verified image is the one kubelet will pull for the
              # main container. We verify by digest and certificate
              # identity, NOT by tag.
              cosign verify \
                --certificate-identity-regexp '^https://github.com/anchore/syft/\.github/workflows/release\.yml@refs/tags/v.*$' \
                --certificate-oidc-issuer 'https://token.actions.githubusercontent.com' \
                --enable-annotations \
                anchore/syft@sha256:c08a4abac5e4abe6dc1939a2b7f12cfa8636f13defecf6476b854f1a0dcc9c84
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 10000
            capabilities:
              drop: [ALL]
      containers:
        - name: sbom-generator
          image: registry.internal/sbom-generator:1.6.0-sbom-pinned
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 4007
              protocol: TCP
          env:
            - name: SYFT_BINARY
              value: /usr/local/bin/syft
            - name: PORT
              value: "4007"
            - name: HOST
              value: "0.0.0.0"
            - name: REQUEST_TIMEOUT_SECONDS
              value: "600"
            - name: MAX_CONCURRENT_SCANS
              value: "4"
            - name: BUS_URL
              valueFrom:
                secretKeyRef:
                  name: sbom-generator-bus
                  key: url
                  optional: true
            # T-07 (S2.8): SSRF defense environment overrides.
            - name: SBOM_GENERATOR_GIT_HOST_ALLOWLIST
              value: "github.com,*.github.com,gitlab.com,*.gitlab.com,bitbucket.org,*.bitbucket.org"
            - name: SBOM_GENERATOR_SSRF_DEFAULT_DENY
              value: "true"
            - name: SBOM_GENERATOR_SSRF_DNS_TIMEOUT_SECONDS
              value: "5"
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 4Gi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 10000
            runAsGroup: 10000
            seccompProfile:
              type: RuntimeDefault
            appArmorProfile:
              type: Localhost
              localhostProfile: sbom-scanner
            capabilities:
              drop: [ALL]
          # Probes: liveness uses /healthz (always 200), readiness uses
          # /healthz/ready which fails until the runner is warmed.
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          # Volume layout for the sbom-generator Pod:
          #   /workspace  -> shared emptyDir for the runner to stage
          #                  downloads (RO from app POV, RW on the dir).
          #   /var/lib/syft -> Syft cache, RW (mounted as emptyDir so it
          #                    doesn't survive Pod restart; Syft re-fetches
          #                    as needed).
          #   /work       -> RO mount for input targets (caller-supplied
          #                  tarballs, git checkouts).
          #   /tmp        -> RW tmpfs for short-lived scratch.
          volumeMounts:
            - name: workspace
              mountPath: /workspace
            - name: syft-cache
              mountPath: /var/lib/syft
            - name: work
              mountPath: /work
              readOnly: true
            - name: tmp
              mountPath: /tmp
            - name: home
              mountPath: /home/sbomgen
      volumes:
        - name: workspace
          emptyDir:
            sizeLimit: 1Gi
        - name: syft-cache
          emptyDir:
            sizeLimit: 512Mi
        - name: work
          # The caller is expected to populate this via a CSI driver or
          # a separate Pod that publishes the input to a PVC. The
          # mount is RO so the generator cannot mutate inputs.
          persistentVolumeClaim:
            claimName: sbom-generator-work
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 256Mi
        - name: home
          emptyDir:
            sizeLimit: 64Mi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: sbom-generator-work
  namespace: sbom-generator
spec:
  accessModes:
    - ReadOnlyMany
  resources:
    requests:
      storage: 4Gi
  storageClassName: standard-ro
---
apiVersion: v1
kind: Service
metadata:
  name: sbom-generator
  namespace: sbom-generator
  labels:
    app.kubernetes.io/name: sbom-generator
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
  selector:
    app.kubernetes.io/name: sbom-generator
---
# -----------------------------------------------------------------------------
# NetworkPolicy: default-deny ingress, egress limited to DNS + egress proxy.
# -----------------------------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: sbom-generator
  namespace: sbom-generator
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: sbom-generator
  policyTypes:
    - Ingress
    - Egress
  # Ingress: only the in-cluster gateway can reach us on the HTTP port.
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: gateway
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: api-gateway
      ports:
        - protocol: TCP
          port: 4007
  # Egress: DNS (UDP+TCP 53 to kube-dns) + the egress proxy.
  egress:
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: egress-proxy
      ports:
        - protocol: TCP
          port: 3128
        - protocol: TCP
          port: 8080
---
# -----------------------------------------------------------------------------
# PodDisruptionBudget: keep at least one replica available during voluntary
# disruptions (node drains, cluster upgrades).
# -----------------------------------------------------------------------------
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: sbom-generator
  namespace: sbom-generator
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: sbom-generator

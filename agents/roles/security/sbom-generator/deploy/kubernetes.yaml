apiVersion: apps/v1
kind: Deployment
metadata:
  name: sbom-generator
  namespace: aionrs
  labels:
    app.kubernetes.io/name: sbom-generator
    app.kubernetes.io/component: security-agent
    app.kubernetes.io/part-of: aionrs-command-center
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/managed-by: aionrs-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: sbom-generator
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sbom-generator
        app.kubernetes.io/component: security-agent
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "4007"
        prometheus.io/path: "/metrics"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: sbom-generator
          image: aionrs/sbom-generator:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 4007
              protocol: TCP
          env:
            - name: PORT
              value: "4007"
            - name: HOST
              value: "0.0.0.0"
            - name: LOG_LEVEL
              value: "INFO"
            - name: BUS_URL
              value: "nats://nats.aionrs.svc.cluster.local:4222"
            - name: MAX_CONCURRENT_SCANS
              value: "4"
            - name: REQUEST_TIMEOUT_SECONDS
              value: "600"
            - name: SBOM_WORKSPACE
              value: "/workspace"
            - name: REQUIRE_AUTH
              value: "true"
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 2Gi
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: workspace
              mountPath: /workspace
            - name: tmp
              mountPath: /tmp
            - name: home
              mountPath: /home/aionrs
      volumes:
        - name: workspace
          emptyDir:
            sizeLimit: 1Gi
        - name: tmp
          emptyDir:
            sizeLimit: 256Mi
        - name: home
          emptyDir:
            sizeLimit: 16Mi
      terminationGracePeriodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: sbom-generator
  namespace: aionrs
  labels:
    app.kubernetes.io/name: sbom-generator
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: sbom-generator
  ports:
    - name: http
      port: 4007
      targetPort: http
      protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: sbom-generator
  namespace: aionrs
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: sbom-generator
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: security-service
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: integration-service
        - namespaceSelector:
            matchLabels:
              name: ingress-nginx
      ports:
        - port: 4007
          protocol: TCP
  egress:
    # DNS
    - to: []
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # NATS bus
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: nats
      ports:
        - port: 4222
          protocol: TCP
    # Syft installer + GitHub (image scans)
    - to:
        - namespaceSelector: {}
      ports:
        - port: 443
          protocol: TCP
        - port: 80
          protocol: TCP
    # Image registries (TLS)
    - to:
        - namespaceSelector: {}
      ports:
        - port: 443
          protocol: TCP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: sbom-generator
  namespace: aionrs
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: sbom-generator
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
    - type: Pods
      pods:
        metric:
          name: active_jobs
        target:
          type: AverageValue
          averageValue: "2"
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
    scaleUp:
      stabilizationWindowSeconds: 30

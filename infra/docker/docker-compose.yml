# AICC local development infrastructure.
#
# Brings up Postgres (with 4 logical databases, one per service) and
# Redis. NATS is included for the Sprint 2 event bus migration.
#
# Usage:
#   docker compose -f infra/docker/docker-compose.yml up -d
#   docker compose -f infra/docker/docker-compose.yml down -v
version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: aicc-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: aicc
      POSTGRES_PASSWORD: aicc
      POSTGRES_DB: aicc
    ports:
      - "5432:5432"
    volumes:
      - aicc_pgdata:/var/lib/postgresql/data
      - ./init/postgres-databases.sql:/docker-entrypoint-initdb.d/01-databases.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aicc -d aicc"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: aicc-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - aicc_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  nats:
    image: nats:2.10-alpine
    container_name: aicc-nats
    restart: unless-stopped
    command: ["-js"]   # JetStream enabled
    ports:
      - "4222:4222"
      - "8222:8222"    # management UI
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Optional: RabbitMQ management UI (alternative broker for Sprint 2)
  # rabbitmq:
  #   image: rabbitmq:3.13-management-alpine
  #   container_name: aicc-rabbitmq
  #   ports:
  #     - "5672:5672"
  #     - "15672:15672"

  # ---------------------------------------------------------------------------
  # Sprint 2 — Security stack (Python services)
  # Owner: SREEngineer (S2.7)
  # ---------------------------------------------------------------------------
  sbom-pipeline:
    build:
      context: ../../backend/services/sbom-pipeline
      dockerfile: Dockerfile
    image: aicc/sbom-pipeline:dev
    container_name: aicc-sbom-pipeline
    restart: unless-stopped
    environment:
      SERVICE_NAME: sbom-pipeline
      SERVICE_VERSION: 0.1.0
      ENV: dev
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_SERVICE_NAME: sbom-pipeline
      TENANT_ID: default
      LOG_HASH_KEY: dev-only-rotate-me
      NATS_URL: nats://nats:4222
      SYFT_BIN: /usr/local/bin/syft
    ports:
      - "4007:4007"   # API
      - "9407:9090"   # management (/healthz, /readyz, /startz, /metrics)
    volumes:
      - sbom_data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/healthz"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 30s
    depends_on:
      nats:
        condition: service_healthy
      otel-collector:
        condition: service_started
    networks:
      - aicc-net
    labels:
      ai-devsecops.io/service: sbom-pipeline
      ai-devsecops.io/readyz: "http://sbom-pipeline:9090/readyz"

  vuln-intel:
    build:
      context: ../../backend/services/vuln-intel
      dockerfile: Dockerfile
    image: aicc/vuln-intel:dev
    container_name: aicc-vuln-intel
    restart: unless-stopped
    environment:
      SERVICE_NAME: vuln-intel
      SERVICE_VERSION: 0.1.0
      ENV: dev
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_SERVICE_NAME: vuln-intel
      TENANT_ID: default
      LOG_HASH_KEY: dev-only-rotate-me
      NATS_URL: nats://nats:4222
      NVD_API_KEY: ${NVD_API_KEY:-}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      OSV_API_URL: https://api.osv.dev
    ports:
      - "4008:4008"
      - "9408:9090"
    volumes:
      - vuln_intel_cache:/cache
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/healthz"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 60s
    depends_on:
      nats:
        condition: service_healthy
      otel-collector:
        condition: service_started
    networks:
      - aicc-net
    labels:
      ai-devsecops.io/service: vuln-intel
      ai-devsecops.io/readyz: "http://vuln-intel:9090/readyz"

  dependency-intel:
    build:
      context: ../../backend/services/dependency-intel
      dockerfile: Dockerfile
    image: aicc/dependency-intel:dev
    container_name: aicc-dependency-intel
    restart: unless-stopped
    environment:
      SERVICE_NAME: dependency-intel
      SERVICE_VERSION: 0.1.0
      ENV: dev
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_SERVICE_NAME: dependency-intel
      TENANT_ID: default
      LOG_HASH_KEY: dev-only-rotate-me
      NATS_URL: nats://nats:4222
      NEO4J_URL: bolt://neo4j:7687
    ports:
      - "4009:4009"
      - "9409:9090"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/healthz"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 60s
    depends_on:
      nats:
        condition: service_healthy
      otel-collector:
        condition: service_started
    networks:
      - aicc-net
    labels:
      ai-devsecops.io/service: dependency-intel
      ai-devsecops.io/readyz: "http://dependency-intel:9090/readyz"

volumes:
  aicc_pgdata:
  aicc_redisdata:
  sbom_data:
  vuln_intel_cache:

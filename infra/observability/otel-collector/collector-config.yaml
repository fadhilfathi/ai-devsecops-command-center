# =============================================================================
# OpenTelemetry Collector configuration
# Owner: SREEngineer
# See: docs/observability/monitoring-architecture.md §3, §5, §7
# =============================================================================

# The collector runs in "gateway" mode (one per node) and receives telemetry
# from the "agent" sidecar (one per pod) via OTLP/gRPC.

receivers:
  # ---- OTLP — primary ingress for traces, metrics, and logs ----
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
        max_recv_msg_size_mib: 16
        keepalive:
          server_parameters:
            min_time_between_pings: 30s
      http:
        endpoint: 0.0.0.0:4318

  # ---- Prometheus scrape (for hosts / sidecars that can only expose /metrics) ----
  prometheus:
    config:
      scrape:
        # Generated by the prometheus receiver itself; see exporters below
        pass_through: true
      global:
        scrape_interval: 30s

  # ---- Host metrics (kubelet, node) ----
  hostmetrics:
    collection_interval: 30s
    scrapers:
      cpu:
      memory:
      disk:
      network:
      filesystem:
      load:
      paging:

  # ---- Kubernetes metadata ----
  k8s_cluster:
    auth_type: serviceAccount

processors:

  # ---------- Batching ----------
  batch:
    send_batch_size: 1024
    send_batch_max_size: 2048
    timeout: 5s
    send_buffer_size: 1024

  # ---------- Memory limiting ----------
  memory_limiter:
    check_interval: 2s
    limit_percentage: 80
    spike_limit_percentage: 25

  # ---------- Resource attributes ----------
  resource:
    attributes:
      - key: deployment.environment
        value: ${env:ENV}
        action: upsert
      - key: service.namespace
        value: ai-devsecops
        action: upsert

  # ---------- k8s attribute enrichment ----------
  k8sattributes:
    auth_type: serviceAccount
    passthrough: false
    extract:
      metadata:
        - k8s.pod.name
        - k8s.pod.uid
        - k8s.deployment.name
        - k8s.namespace.name
        - k8s.node.name
        - k8s.container.name
      labels:
        - tag_name: app.kubernetes.io/component
          key: app.kubernetes.io/component
          from: pod
        - tag_name: tenant_id
          key: ai-devsecops.io/tenant
          from: pod
    pod_association:
      - sources:
          - from: resource_attribute
            name: k8s.pod.uid

  # ---------- Tail-based sampling (traces) ----------
  tail_sampling:
    decision_wait: 30s
    num_traces: 200000
    expected_new_traces_per_sec: 1000
    policies:
      # Always keep error traces
      - name: errors
        type: status_code
        status_code:
          status_codes: [ERROR]
      # Keep traces that exceed 5x the route's p99 latency
      - name: slow-traces
        type: latency
        latency:
          threshold_ms: 5000
      # Keep security-review traces
      - name: security-review
        type: string_attribute
        string_attribute:
          key: security.review
          values: ["true"]
      # Keep 5% of the rest for baseline
      - name: baseline
        type: probabilistic
        probabilistic:
          sampling_percentage: 5

  # ---------- Log redaction (safety net — SDK does primary redaction) ----------
  attributes/log_redaction:
    actions:
      - key: http.request.header.authorization
        action: delete
      - key: http.request.header.cookie
        action: delete
      - key: db.statement
        action: hash
      - key: email
        action: hash
      - key: user.email
        action: hash
      - key: user_id
        action: hash

  # ---------- Span/log attribute limits ----------
  attributes/span_limit:
    span:
      max_attributes: 128
    log:
      max_attributes: 64
    span_event:
      max_attributes: 64

  # ---------- Metrics filtering ----------
  filter/metrics:
    metrics:
      exclude:
        match_type: regexp
        metric_names:
          - "go_gc_.*"
          - "process_.*"
          - "promhttp_.*"

  # ---------- Resource detection ----------
  resourcedetection:
    detectors: [env, system, gcp, ec2, azure]
    timeout: 2s

exporters:
  # ---------- Prometheus remote write ----------
  prometheusremotewrite:
    endpoint: ${env:PROM_REMOTE_WRITE_URL}
    tls:
      insecure: false
    retry_on_failure:
      enabled: true
      initial_interval: 1s
    sending_queue:
      enabled: true
      num_consumers: 4
      queue_size: 2000

  # ---------- Loki (logs) ----------
  loki:
    endpoint: ${env:LOKI_URL}/loki/api/v1/push
    tenant_id: ${env:TENANT_ID}
    default_labels_enabled:
      service: true
      env: true
      tenant: true
    headers:
      X-Scope-OrgID: ${env:TENANT_ID}

  # ---------- Tempo (traces) ----------
  otlp/tempo:
    endpoint: ${env:TEMPO_URL}:4317
    tls:
      insecure: false
    sending_queue:
      enabled: true
      num_consumers: 8
      queue_size: 2000
    retry_on_failure:
      enabled: true

  # ---------- Self-observability ----------
  prometheus/internal:
    endpoint: 0.0.0.0:8888
    const_labels:
      service: otel-collector
      env: ${env:ENV}

  # ---------- Debug (only when DEBUG=true) ----------
  debug:
    verbosity: basic
    sampling_initial: 5
    sampling_thereafter: 200

extensions:
  health_check:
    endpoint: 0.0.0.0:13133
    path: /healthz
  pprof:
    endpoint: 0.0.0.0:1777
  zpages:
    endpoint: 0.0.0.0:55679

service:
  extensions: [health_check, pprof, zpages]
  telemetry:
    metrics:
      address: 0.0.0.0:8888
    logs:
      level: info
  pipelines:

    # -------- Traces --------
    traces:
      receivers: [otlp]
      processors:
        - memory_limiter
        - k8sattributes
        - resourcedetection
        - attributes/log_redaction
        - attributes/span_limit
        - tail_sampling
        - batch
      exporters: [otlp/tempo, debug]

    # -------- Metrics --------
    metrics:
      receivers: [otlp, prometheus, hostmetrics]
      processors:
        - memory_limiter
        - k8sattributes
        - resourcedetection
        - filter/metrics
        - batch
      exporters: [prometheusremotewrite, prometheus/internal]

    # -------- Logs --------
    logs:
      receivers: [otlp]
      processors:
        - memory_limiter
        - k8sattributes
        - resourcedetection
        - attributes/log_redaction
        - batch
      exporters: [loki]

# =============================================================================
# Prometheus alert rules — see docs/observability/alerting-runbooks.md
# Owner: SREEngineer
# =============================================================================
groups:
  # ---------------------------------------------------------------------------
  # Standard service alerts
  # ---------------------------------------------------------------------------
  - name: service.standard
    interval: 30s
    rules:
      - alert: ServiceDown
        expr: up == 0
        for: 2m
        labels:
          severity: page
        annotations:
          summary: "Service {{ $labels.service }} is down (instance {{ $labels.instance }})"
          description: |
            Prometheus has not been able to scrape {{ $labels.service }} for 2 minutes.
            Check pod status and recent deploys.
          runbook: "{{ $labels.runbook_base_url }}/ServiceDown"

      - alert: ServiceHigh5xxRate
        expr: |
          sum by (service, route) (rate(http_requests_total{status=~"5.."}[5m]))
            / sum by (service, route) (rate(http_requests_total[5m]))
            > 0.05
        for: 5m
        labels:
          severity: page
        annotations:
          summary: "{{ $labels.service }} 5xx rate on {{ $labels.route }} is {{ $value | humanizePercentage }}"
          description: |
            The 5xx rate on {{ $labels.service }} route {{ $labels.route }} has exceeded 5%
            for 5 minutes. Investigate recent errors in Grafana Explore filtered by
            service={{ $labels.service }} and route={{ $labels.route }}.
          runbook: "{{ $labels.runbook_base_url }}/ServiceHigh5xxRate"
          dashboard: "{{ $labels.dashboard_base_url }}/d/{{ $labels.service }}-overview"

      - alert: ServiceHighP99Latency
        expr: |
          histogram_quantile(0.99,
            sum by (le, service, route) (rate(http_request_duration_seconds_bucket[5m]))
          ) > 1
        for: 10m
        labels:
          severity: ticket
        annotations:
          summary: "{{ $labels.service }} p99 latency on {{ $labels.route }} > 1s"
          description: "p99 latency = {{ $value | humanizeDuration }}. Open the latency panel and look for slow dependencies."
          runbook: "{{ $labels.runbook_base_url }}/ServiceHighP99Latency"

      - alert: ServiceErrorBudgetExhausted
        expr: service_error_budget_remaining_ratio < 0
        for: 1m
        labels:
          severity: page
        annotations:
          summary: "{{ $labels.service }} has exhausted its error budget"
          description: |
            SLO budget remaining: {{ $value | humanizePercentage }}.
            Deploys to {{ $labels.service }} are halted by the admission webhook.
            Engage SRE and the service owner; see the burn breakdown dashboard.
          runbook: "{{ $labels.runbook_base_url }}/ServiceErrorBudgetExhausted"

      - alert: ServiceDeepHealthCheckFailing
        expr: probe_success{job="readyz-probes"} == 0
        for: 3m
        labels:
          severity: page
        annotations:
          summary: "{{ $labels.service }} /readyz is failing"
          description: "The deep readiness probe is returning non-2xx. A downstream dependency is likely unhealthy."
          runbook: "{{ $labels.runbook_base_url }}/ServiceDeepHealthCheckFailing"

      - alert: ServiceCardinalityExplosion
        expr: deriv(prometheus_tsdb_head_series[10m]) > 100000
        for: 5m
        labels:
          severity: ticket
        annotations:
          summary: "Cardinality on {{ $labels.job }} is growing > 100k series/min"
          description: "Inspect the top 50 label combinations at /api/v1/status/tsdb and roll back the offending change."
          runbook: "{{ $labels.runbook_base_url }}/ServiceCardinalityExplosion"

      - alert: WatchdogDeadmanSwitch
        expr: vector(time() - prometheus_last_evaluation_timestamp) > 300
        for: 0m
        labels:
          severity: page
        annotations:
          summary: "Prometheus is not evaluating rules"
          description: "Prometheus last evaluation was more than 5 minutes ago. The monitoring stack itself is unhealthy."
          runbook: "{{ $labels.runbook_base_url }}/WatchdogDeadmanSwitch"

  # ---------------------------------------------------------------------------
  # SLO burn-rate alerts — example for Auth availability
  # Template lives at infra/observability/prometheus/templates/slo-burn.yml.j2
  # ---------------------------------------------------------------------------
  - name: slo.burn.auth.availability
    interval: 30s
    rules:
      # Fast burn: budget would exhaust in ~2 days at this rate
      - alert: SLO_Auth_Availability_FastBurn
        expr: |
          (
            service:auth:availability:ratio5m < (1 - (1 - 0.999) * 14.4)
            and
            service:auth:availability:ratio1h < (1 - (1 - 0.999) * 14.4)
          )
          or
          (
            service:auth:availability:ratio6h < (1 - (1 - 0.999) * 14.4)
            and
            service:auth:availability:ratio1h < (1 - (1 - 0.999) * 14.4)
          )
        for: 2m
        labels:
          severity: page
          slo: auth/availability
        annotations:
          summary: "Auth SLO 'availability' is fast-burning"
          description: |
            Burn rate: 14.4x. Budget would exhaust in ~2 days.
            Budget remaining: {{ with query "service_error_budget_remaining_ratio{service='auth',slo='availability'}" }}{{ . | first | value | humanizePercentage }}{{ end }}.
          runbook: "{{ $labels.runbook_base_url }}/SLOBurnIncident"
          dashboard: "{{ $labels.dashboard_base_url }}/d/auth-slo"

      # Slow burn: budget would exhaust in ~30 days
      - alert: SLO_Auth_Availability_SlowBurn
        expr: |
          (
            service:auth:availability:ratio24h < 0.999
            and
            service:auth:availability:ratio3d < 0.999
          )
        for: 30m
        labels:
          severity: ticket
          slo: auth/availability
        annotations:
          summary: "Auth SLO 'availability' is slow-burning"
          description: "Burn rate: 1x. Investigate root cause within 1 business day."
          runbook: "{{ $labels.runbook_base_url }}/SLOSlowBurn"

  # ---------------------------------------------------------------------------
  # Agent alerts
  # ---------------------------------------------------------------------------
  - name: agent.standard
    interval: 30s
    rules:
      - alert: AgentTaskFailureRate
        expr: |
          sum by (agent, task_type) (rate(agent_tasks_total{outcome="failure"}[5m]))
            / sum by (agent, task_type) (rate(agent_tasks_total[5m]))
            > 0.10
        for: 10m
        labels:
          severity: ticket
        annotations:
          summary: "Agent {{ $labels.agent }} task '{{ $labels.task_type }}' failing > 10%"
          description: "Failure rate: {{ $value | humanizePercentage }}. Check LLM provider status and tool call errors."
          runbook: "{{ $labels.runbook_base_url }}/AgentTaskFailureRate"

      - alert: AgentTaskDurationP99High
        expr: |
          histogram_quantile(0.99,
            sum by (le, agent, task_type) (rate(agent_task_duration_seconds_bucket[10m]))
          ) > 300
        for: 15m
        labels:
          severity: ticket
        annotations:
          summary: "Agent {{ $labels.agent }} task p99 > 5m"
          description: "Sustained for 15m. May indicate provider degradation or runaway loops."
          runbook: "{{ $labels.runbook_base_url }}/AgentTaskDurationP99High"

      - alert: AgentLLMTokenSpendAnomaly
        expr: |
          sum by (agent, model) (rate(agent_llm_tokens_total[1h]))
            > 3 * avg_over_time(
                sum by (agent, model) (rate(agent_llm_tokens_total[1h]))[7d:1h]
              )
        for: 30m
        labels:
          severity: ticket
        annotations:
          summary: "Agent {{ $labels.agent }} LLM spend 3x baseline on {{ $labels.model }}"
          description: "Suspect runaway loops or abuse. Lower max_tokens via dynamic config."
          runbook: "{{ $labels.runbook_base_url }}/AgentLLMTokenSpendAnomaly"

      - alert: AgentDecisionOverride
        expr: |
          sum by (agent) (rate(agent_decision_override_total[5m]))
            / sum by (agent) (rate(agent_decision_total[5m]))
            > 0.20
        for: 10m
        labels:
          severity: ticket
        annotations:
          summary: "Agent {{ $labels.agent }} decision override rate > 20%"
          description: "Likely model drift. Engage AI team; consider downgrading to 'suggest' mode."
          runbook: "{{ $labels.runbook_base_url }}/AgentDecisionOverride"

  # ---------------------------------------------------------------------------
  # Sprint 2 — Security stack alerts
  #
  # TODO(burn-rate): F1 from PlatformArchitect SLO sign-off (2026-06-12).
  # The SLOs in docs/observability/slos-security-stack.md v1.0 (Locked) all
  # have a 30d error budget. The alerts below are threshold-based (e.g.
  # "p95 > X for 5m"); they catch per-request regressions but not slow
  # budget consumption. For Sprint 3, add Google SRE Workbook multi-window
  # burn-rate alerts:
  #   - Fast burn (page): 2% of 30d budget consumed in 1h
  #   - Slow burn (ticket): 5% of 30d budget consumed in 6h
  # Examples already exist in the slo.burn.auth.availability group above
  # (SLO_Auth_Availability_FastBurn / _SlowBurn). Mirror that pattern for
  # each SLO in §2-§4 of slos-security-stack.md. Hold off until we have
  # ~14d of telemetry so burn-rate windows are meaningful.
  # ---------------------------------------------------------------------------
  - name: security_stack.runtime
    interval: 30s
    rules:
      - alert: SbvomPipelineDown
        expr: up{service="sbom-pipeline"} == 0
        for: 5m
        labels:
          severity: page
          service: sbom-pipeline
        annotations:
          summary: "sbom-pipeline is down for 5m"
          description: "Prometheus has not been able to scrape sbom-pipeline for 5 minutes. SBOM generation is stalled."
          runbook: "{{ $labels.runbook_base_url }}/SbvomPipelineDown"

      - alert: VulnIngestionLag
        expr: (time() - max by (source) (vuln_feed_last_refresh_timestamp_seconds{source=~"nvd|ghsa|osv"})) > 86400
        for: 10m
        labels:
          severity: page
          service: vuln-intel
        annotations:
          summary: "{{ $labels.source }} feed not refreshed in 24h"
          description: "Vulnerability feed {{ $labels.source }} is stale. Check the feed poller and rate limits."
          runbook: "{{ $labels.runbook_base_url }}/VulnIngestionLag"

      - alert: ScanQueueBacklog
        expr: devsecops_queue_depth{service=~"sbom-pipeline|dependency-intel",queue_name=~"sbom_jobs|risk_calc_jobs"} > 100
        for: 15m
        labels:
          severity: ticket
        annotations:
          summary: "Scan queue backlog > 100 for 15m on {{ $labels.service }}/{{ $labels.queue_name }}"
          description: "Pending items: {{ $value }}. Consider scaling the worker pool or check for stuck jobs."
          runbook: "{{ $labels.runbook_base_url }}/ScanQueueBacklog"

      - alert: RiskCalcHighLatency
        expr: |
          histogram_quantile(0.95,
            sum by (le, service) (rate(devsecops_risk_calculation_duration_seconds_bucket{service="dependency-intel"}[5m]))
          ) > 10
        for: 5m
        labels:
          severity: ticket
          service: dependency-intel
        annotations:
          summary: "dependency-intel p95 risk calc > 10s for 5m"
          description: "p95 risk calc duration is {{ $value | humanizeDuration }}. Could be large SBOMs, slow graph traversal, or upstream lag. See the per-bucket alerts for actionable detail."
          runbook: "{{ $labels.runbook_base_url }}/RiskCalcHighLatency"

      # Per-bucket risk-calc alerts (locked by SLO targets in
      # docs/observability/slos-security-stack.md §3).
      # Bucket scheme is D7 (SecurityArchitect, S2.8 cap-driven, 2026-06-12):
      # xs (<10) / small (10–99) / medium (100–999) / large (1k–4,999) / xlarge (≥5k).
      # xxlarge bucket is RETIRED — workloads that would have been xxlarge now
      # flow into the xlarge alert and are accepted as SLO overshoots.
      - alert: RiskCalcHighLatencyXs
        expr: |
          histogram_quantile(0.95,
            sum by (le) (rate(devsecops_risk_calculation_duration_seconds_bucket{service="dependency-intel",sbom_size_bucket="xs"}[5m]))
          ) > 0.5
        for: 5m
        labels:
          severity: ticket
          service: dependency-intel
        annotations:
          summary: "risk calc p95 > 0.5s for xs SBOMs (<10 components)"
          description: "p95 = {{ $value | humanizeDuration }}. Trivially small SBOMs should be sub-100ms. Likely graph-DB warm-up or service cold start."
          runbook: "{{ $labels.runbook_base_url }}/RiskCalcHighLatencyXs"

      - alert: RiskCalcHighLatencySmall
        expr: |
          histogram_quantile(0.95,
            sum by (le) (rate(devsecops_risk_calculation_duration_seconds_bucket{service="dependency-intel",sbom_size_bucket="small"}[5m]))
          ) > 1
        for: 5m
        labels:
          severity: ticket
          service: dependency-intel
        annotations:
          summary: "risk calc p95 > 1s for small SBOMs (10–99 components)"
          description: "p95 = {{ $value | humanizeDuration }}. Small SBOMs should be sub-second. Likely graph-DB issue or memory pressure."
          runbook: "{{ $labels.runbook_base_url }}/RiskCalcHighLatencySmall"

      - alert: RiskCalcHighLatencyMedium
        expr: |
          histogram_quantile(0.95,
            sum by (le) (rate(devsecops_risk_calculation_duration_seconds_bucket{service="dependency-intel",sbom_size_bucket="medium"}[5m]))
          ) > 5
        for: 5m
        labels:
          severity: ticket
          service: dependency-intel
        annotations:
          summary: "risk calc p95 > 5s for medium SBOMs (100–999 components)"
          description: "p95 = {{ $value | humanizeDuration }}. Cold cache or GC?"
          runbook: "{{ $labels.runbook_base_url }}/RiskCalcHighLatencyMedium"

      - alert: RiskCalcHighLatencyLarge
        expr: |
          histogram_quantile(0.95,
            sum by (le) (rate(devsecops_risk_calculation_duration_seconds_bucket{service="dependency-intel",sbom_size_bucket="large"}[5m]))
          ) > 15
        for: 5m
        labels:
          severity: ticket
          service: dependency-intel
        annotations:
          summary: "risk calc p95 > 15s for large SBOMs (1k–4,999 components)"
          description: "p95 = {{ $value | humanizeDuration }}. Check graph DB indices."
          runbook: "{{ $labels.runbook_base_url }}/RiskCalcHighLatencyLarge"

      - alert: RiskCalcHighLatencyXlarge
        expr: |
          histogram_quantile(0.95,
            sum by (le) (rate(devsecops_risk_calculation_duration_seconds_bucket{service="dependency-intel",sbom_size_bucket="xlarge"}[5m]))
          ) > 60
        for: 5m
        labels:
          severity: ticket
          service: dependency-intel
        annotations:
          summary: "risk calc p95 > 60s for xlarge SBOMs (≥5k components)"
          description: "p95 = {{ $value | humanizeDuration }}. Likely deep transitive chains, N+1 graph queries, or runaway SBOMs (former xxlarge bucket). May be acceptable overshoot — see SLO doc §3."
          runbook: "{{ $labels.runbook_base_url }}/RiskCalcHighLatencyXlarge"

  # ---------------------------------------------------------------------------
  # Sprint 2.8 — Security control integrity alerts
  #
  # Added 2026-06-12 (S2.8 follow-up; SecurityArchitect spec).
  # These are security-control integrity signals (T-02, T-03, T-04, T-05, T-09
  # mitigations), NOT runtime SLI. They page on tamper/exfil/integrity events
  # rather than latency/throughput.
  # ---------------------------------------------------------------------------
  - name: security_stack.s2_8_controls
    rules:

      - alert: RiskScoreAuditChainBroken
        expr: sum by (service) (devsecops_risk_score_audit_chain_verified{ok="0"}) > 0
        for: 1m
        labels:
          severity: page
          s2_8_control: T-05
        annotations:
          summary: "risk-score audit chain verification FAILED on {{ $labels.service }}"
          description: "T-05 tamper detection: at least one service has ok=0 for risk-score audit chain. Possible tamper event. Page on-call immediately."
          runbook: "{{ $labels.runbook_base_url }}/RiskScoreAuditChainBroken"

      - alert: CanaryTestFailure
        expr: increase(devsecops_canary_test_failures_total[1m]) > 0
        for: 1m
        labels:
          severity: page
          s2_8_control: T-09
        annotations:
          summary: "data-exfil canary test failed ({{ $labels.endpoint }})"
          description: "T-09 canary detected possible data exfiltration on endpoint {{ $labels.endpoint }}. Page on-call immediately and initiate incident response."
          runbook: "{{ $labels.runbook_base_url }}/CanaryTestFailure"

      - alert: CveFeedIntegrityRejected
        expr: sum by (feed) (rate(devsecops_cve_feed_records_rejected_total{reason="integrity"}[5m])) > 0.1
        for: 5m
        labels:
          severity: ticket
          s2_8_control: T-02
        annotations:
          summary: "CVE feed integrity rejections > 0.1/s for {{ $labels.feed }}"
          description: "T-02 feed integrity gate is rejecting records from {{ $labels.feed }} at > 0.1/s for 5m. Possible feed compromise or upstream schema change. Investigate before next ingestion cycle."
          runbook: "{{ $labels.runbook_base_url }}/CveFeedIntegrityRejected"

      - alert: CosignVerifySlow
        expr: |
          histogram_quantile(0.95,
            sum by (le) (rate(devsecops_cosign_verify_duration_seconds_bucket{service="sbom-pipeline",result="success"}[5m]))
          ) > 30
        for: 10m
        labels:
          severity: ticket
          s2_8_control: T-04
        annotations:
          summary: "cosign verify p95 > 30s on sbom-pipeline"
          description: "T-04 supply-chain verification is slow. p95 = {{ $value | humanizeDuration }}. Rekor or Cosign service degradation. Check upstream service health."
          runbook: "{{ $labels.runbook_base_url }}/CosignVerifySlow"

      - alert: SbomValidationErrorRate
        expr: |
          (
            sum(rate(devsecops_sbom_validation_errors_total[5m]))
            /
            sum(rate(devsecops_proxy_request_total[5m]))
          ) > 0.01
        for: 5m
        labels:
          severity: ticket
          s2_8_control: T-08
        annotations:
          summary: "SBOM validation error rate > 1%"
          description: "T-08 input validation: more than 1% of proxy requests are being rejected for SBOM validation. Investigate possible client regression or active attack pattern."
          runbook: "{{ $labels.runbook_base_url }}/SbomValidationErrorRate"

      - alert: LlmTokenBudgetLow
        expr: devsecops_llm_token_budget_remaining < 0.20
        for: 5m
        labels:
          severity: ticket
          s2_8_control: T-03
        annotations:
          summary: "LLM token budget < 20% remaining"
          description: "T-03 cost guardrail: vuln-intel LLM summarization budget is below 20%. Throttle non-essential LLM calls or expand budget before next cycle."
          runbook: "{{ $labels.runbook_base_url }}/LlmTokenBudgetLow"

  # ---------------------------------------------------------------------------
  # Sprint 2.9 — Compliance audit log emission integrity alerts
  #
  # Added 2026-06-12 (S2.9 follow-up; ComplianceOfficer spec, path (b)).
  # These are compliance-integrity signals, NOT runtime SLI. They page on
  # audit emission failures (silent loss of security-relevant events) which
  # is a compliance regression (CIS 8.11, NIST AU-2/AU-3).
  # ---------------------------------------------------------------------------
  - name: security_stack.audit_emission
    rules:

      - alert: AuditLogEmissionErrorRate
        # Two-tier alerting: ticket on >0.1/s for 5m (steady-state handle),
        # page on >1/s for 5m (acute regression). The page threshold aligns
        # with the SLO doc §4.2 success rate target (99% over 30d).
        expr: |
          (
            sum(rate(devsecops_audit_log_emission_total{result="error"}[5m]))
            /
            sum(rate(devsecops_audit_log_emission_total[5m]))
          ) > 0.01
        for: 5m
        labels:
          severity: ticket
          s2_9_control: audit_log_emission
        annotations:
          summary: "audit log emission error rate > 1%"
          description: "More than 1% of audit log emissions are failing. This is a compliance regression (CIS 8.11, NIST AU-2/AU-3). Investigate bus connection, schema validation, or write contention."
          runbook: "{{ $labels.runbook_base_url }}/compliance-audit-log"

      # Page-only alert: 10x the steady-state error rate. Fires when the
      # SLO is in acute violation (>=10% of audit records being lost).
      - alert: AuditLogEmissionErrorRatePage
        expr: |
          sum(rate(devsecops_audit_log_emission_total{result="error"}[5m])) > 1
        for: 5m
        labels:
          severity: page
          s2_9_control: audit_log_emission
        annotations:
          summary: "audit log emission error rate > 1/s (acute)"
          description: "Audit log emission is failing at a rate of >1 per second for 5+ minutes. This is a critical compliance regression — security-relevant events are being silently lost. Page on-call immediately."
          runbook: "{{ $labels.runbook_base_url }}/compliance-audit-log"
